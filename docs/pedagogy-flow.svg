<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  
  <text x="450" y="32" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="3">LEARNING METHODOLOGY</text>
  
  <!-- Phase 1: Feel the Attack -->
  <rect x="60" y="50" width="220" height="100" rx="8" fill="#1c1917" stroke="#ef4444" stroke-width="1.5"/>
  <text x="170" y="75" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 1</text>
  <text x="170" y="100" text-anchor="middle" fill="#fee2e2" font-family="Georgia, serif" font-size="19" font-weight="700">Feel the Attack</text>
  <text x="170" y="120" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">Watch the vulnerability succeed</text>
  <text x="170" y="135" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="11">on local dummy data</text>
  
  <!-- Arrow 1→2 -->
  <line x1="290" y1="100" x2="330" y2="100" stroke="#dc2626" stroke-width="2" filter="url(#glow)"/>
  <polygon points="330,95 342,100 330,105" fill="#dc2626"/>
  
  <!-- Phase 2: Read the Theory -->
  <rect x="350" y="50" width="200" height="100" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="450" y="75" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 2</text>
  <text x="450" y="100" text-anchor="middle" fill="#ede9fe" font-family="Georgia, serif" font-size="19" font-weight="700">Read the Theory</text>
  <text x="450" y="120" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11">Guided reading connecting</text>
  <text x="450" y="135" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="11">attack → defense model</text>

  <!-- Arrow 2→3 -->
  <line x1="560" y1="100" x2="600" y2="100" stroke="#7c3aed" stroke-width="2" filter="url(#glow)"/>
  <polygon points="600,95 612,100 600,105" fill="#7c3aed"/>
  
  <!-- Phase 3: Build the Defense -->
  <rect x="620" y="50" width="220" height="100" rx="8" fill="#052e16" stroke="#22c55e" stroke-width="1.5"/>
  <text x="730" y="75" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 3</text>
  <text x="730" y="100" text-anchor="middle" fill="#dcfce7" font-family="Georgia, serif" font-size="19" font-weight="700">Build the Defense</text>
  <text x="730" y="120" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11">TODO-scaffolded implementation</text>
  <text x="730" y="135" text-anchor="middle" fill="#4ade80" font-family="system-ui, sans-serif" font-size="11">validated by test suite</text>

  <!-- Bottom tagline -->
  <text x="450" y="180" text-anchor="middle" fill="#64748b" font-family="Georgia, serif" font-size="13" font-style="italic">The test that failed in Phase 1 passes in Phase 3. That's understanding.</text>
</svg>
