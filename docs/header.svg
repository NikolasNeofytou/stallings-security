<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1220"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="spine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5c1a1a"/>
      <stop offset="100%" style="stop-color:#991b1b"/>
    </linearGradient>
    <linearGradient id="cover" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7f1d1d"/>
      <stop offset="60%" style="stop-color:#611414"/>
      <stop offset="100%" style="stop-color:#450a0a"/>
    </linearGradient>
  </defs>
  
  <rect width="900" height="220" rx="12" fill="url(#bg)"/>

  <!-- Book -->
  <rect x="40" y="25" width="12" height="170" rx="2" fill="url(#spine)"/>
  <rect x="52" y="25" width="120" height="170" rx="0 4 4 0" fill="url(#cover)"/>
  <rect x="52" y="25" width="120" height="170" rx="0 4 4 0" fill="none" stroke="#ef4444" stroke-width="0.5" opacity="0.4"/>
  
  <!-- Book cover details -->
  <line x1="65" y1="50" x2="158" y2="50" stroke="#f87171" stroke-width="0.5" opacity="0.3"/>
  <text x="112" y="72" text-anchor="middle" fill="#fca5a5" font-family="Georgia, serif" font-size="10" font-weight="700">COMPUTER</text>
  <text x="112" y="89" text-anchor="middle" fill="#fee2e2" font-family="Georgia, serif" font-size="13" font-weight="700">SECURITY</text>
  <text x="112" y="106" text-anchor="middle" fill="#fca5a5" font-family="Georgia, serif" font-size="8">PRINCIPLES &amp; PRACTICE</text>
  <line x1="65" y1="115" x2="158" y2="115" stroke="#f87171" stroke-width="0.5" opacity="0.3"/>
  <text x="112" y="133" text-anchor="middle" fill="#f87171" font-family="system-ui, sans-serif" font-size="7.5">STALLINGS · BROWN</text>
  
  <!-- Lock icon on cover -->
  <rect x="100" y="145" width="24" height="18" rx="3" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <path d="M107,145 L107,139 Q107,133 112,133 Q117,133 117,139 L117,145" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.4"/>
  <circle cx="112" cy="155" r="2" fill="#ef4444" opacity="0.4"/>
  
  <!-- Page edges -->
  <line x1="172" y1="28" x2="172" y2="192" stroke="#334155" stroke-width="1"/>
  <line x1="171" y1="29" x2="171" y2="191" stroke="#1e293b" stroke-width="1"/>
  
  <!-- Title text -->
  <text x="210" y="65" fill="#e2e8f0" font-family="Georgia, serif" font-size="28" font-weight="700">Computer Security</text>
  <text x="210" y="95" fill="#94a3b8" font-family="Georgia, serif" font-size="16" font-style="italic">learn by breaking, then building</text>
  
  <line x1="210" y1="110" x2="430" y2="110" stroke="#334155" stroke-width="1"/>
  
  <text x="210" y="135" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">Stallings &amp; Brown · Principles and Practice</text>
  <text x="210" y="158" fill="#475569" font-family="system-ui, sans-serif" font-size="11">Feel the Attack → Read the Theory → Build the Defense</text>
  
  <!-- Phase icons -->
  <g transform="translate(210, 172)">
    <rect x="0" y="0" width="90" height="22" rx="4" fill="#450a0a" stroke="#ef4444" stroke-width="0.8"/>
    <text x="45" y="15" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Feel the Attack</text>
    
    <rect x="100" y="0" width="60" height="22" rx="4" fill="#4c1d95" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="130" y="15" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Read</text>
    
    <rect x="170" y="0" width="100" height="22" rx="4" fill="#052e16" stroke="#22c55e" stroke-width="0.8"/>
    <text x="220" y="15" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="9" font-weight="600">Build the Defense</text>
  </g>

  <!-- Stats on the right -->
  <g transform="translate(680, 45)">
    <text x="0" y="0" fill="#475569" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2">CHAPTERS</text>
    <text x="0" y="25" fill="#e2e8f0" font-family="Georgia, serif" font-size="32" font-weight="700">7</text>
    <text x="40" y="25" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">planned</text>
    
    <text x="0" y="55" fill="#475569" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2">TESTS</text>
    <text x="0" y="80" fill="#e2e8f0" font-family="Georgia, serif" font-size="32" font-weight="700">41</text>
    <text x="45" y="80" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">per chapter</text>
    
    <text x="0" y="110" fill="#475569" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2">PROJECTS</text>
    <text x="0" y="130" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">Threat Modeler · Password Vault</text>
    <text x="0" y="145" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">RBAC Engine · Query Shield</text>
    
    <text x="0" y="170" fill="#475569" font-family="system-ui, sans-serif" font-size="10" letter-spacing="2">ALL DEMOS ON</text>
    <text x="0" y="188" fill="#f87171" font-family="system-ui, sans-serif" font-size="11" font-weight="600">Local dummy data only</text>
  </g>
</svg>
