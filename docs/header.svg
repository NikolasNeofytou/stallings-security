<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <rect width="900" height="200" fill="#111318"/>
  
  <!-- Top rule -->
  <line x1="40" y1="20" x2="860" y2="20" stroke="#3d3d3d" stroke-width="1.5"/>
  <line x1="40" y1="23" x2="860" y2="23" stroke="#3d3d3d" stroke-width="0.3"/>
  
  <!-- Classification stripe -->
  <rect x="40" y="28" width="120" height="16" fill="#7f1d1d" rx="1"/>
  <text x="100" y="39" text-anchor="middle" fill="#fecaca" font-family="'Courier New', monospace" font-size="8" letter-spacing="2" font-weight="700">UNCLASSIFIED</text>
  
  <!-- Title block -->
  <text x="48" y="72" fill="#9ca3af" font-family="'Courier New', monospace" font-size="10" letter-spacing="3">STALLINGS · BROWN</text>
  <text x="48" y="105" fill="#e5e7eb" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400">Computer Security</text>
  <text x="48" y="128" fill="#6b7280" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-style="italic">Principles and Practice</text>
  
  <!-- Divider -->
  <line x1="48" y1="140" x2="450" y2="140" stroke="#2d2d2d" stroke-width="0.5"/>
  
  <!-- Phase markers in monospace -->
  <g font-family="'Courier New', monospace" font-size="10">
    <text x="48" y="158" fill="#7f1d1d">▸</text>
    <text x="62" y="158" fill="#9ca3af">Feel the Attack</text>
    <text x="200" y="158" fill="#4b5563">→</text>
    <text x="220" y="158" fill="#9ca3af">Read</text>
    <text x="278" y="158" fill="#4b5563">→</text>
    <text x="298" y="158" fill="#9ca3af">Build the Defense</text>
    <text x="468" y="158" fill="#4b5563">→</text>
    <text x="488" y="158" fill="#22c55e">ALL TESTS PASS</text>
  </g>
  
  <!-- Right side: threat count visualization -->
  <g transform="translate(660, 40)">
    <text x="0" y="0" fill="#4b5563" font-family="'Courier New', monospace" font-size="9" letter-spacing="2">THREAT ANALYSIS</text>
    
    <!-- Grid of dots representing threats found vs missed -->
    <g transform="translate(0, 14)">
      <!-- Row labels -->
      <text x="-2" y="12" text-anchor="end" fill="#4b5563" font-family="'Courier New', monospace" font-size="7">C</text>
      <text x="-2" y="26" text-anchor="end" fill="#4b5563" font-family="'Courier New', monospace" font-size="7">I</text>
      <text x="-2" y="40" text-anchor="end" fill="#4b5563" font-family="'Courier New', monospace" font-size="7">A</text>
      
      <!-- Confidentiality threats -->
      <circle cx="12" cy="9" r="3" fill="#991b1b"/><circle cx="24" cy="9" r="3" fill="#991b1b"/><circle cx="36" cy="9" r="3" fill="#991b1b"/>
      <circle cx="48" cy="9" r="3" fill="#991b1b"/><circle cx="60" cy="9" r="3" fill="#991b1b"/><circle cx="72" cy="9" r="3" fill="#991b1b"/>
      <circle cx="84" cy="9" r="3" fill="#991b1b"/><circle cx="96" cy="9" r="3" fill="#991b1b"/>
      
      <!-- Integrity threats -->
      <circle cx="12" cy="23" r="3" fill="#92400e"/><circle cx="24" cy="23" r="3" fill="#92400e"/><circle cx="36" cy="23" r="3" fill="#92400e"/>
      <circle cx="48" cy="23" r="3" fill="#92400e"/><circle cx="60" cy="23" r="3" fill="#92400e"/><circle cx="72" cy="23" r="3" fill="#92400e"/>
      <circle cx="84" cy="23" r="3" fill="#92400e"/><circle cx="96" cy="23" r="3" fill="#92400e"/>
      <circle cx="108" cy="23" r="3" fill="#92400e"/><circle cx="120" cy="23" r="3" fill="#92400e"/>
      
      <!-- Availability threats -->
      <circle cx="12" cy="37" r="3" fill="#1e3a5f"/><circle cx="24" cy="37" r="3" fill="#1e3a5f"/><circle cx="36" cy="37" r="3" fill="#1e3a5f"/>
      <circle cx="48" cy="37" r="3" fill="#1e3a5f"/><circle cx="60" cy="37" r="3" fill="#1e3a5f"/><circle cx="72" cy="37" r="3" fill="#1e3a5f"/>
    </g>
    
    <text x="0" y="72" fill="#6b7280" font-family="'Courier New', monospace" font-size="8">24 threats · 8 assets</text>
    <text x="0" y="84" fill="#6b7280" font-family="'Courier New', monospace" font-size="8">41 tests per chapter</text>
    
    <text x="0" y="108" fill="#4b5563" font-family="'Courier New', monospace" font-size="9" letter-spacing="2">CHAPTERS PLANNED</text>
    <text x="0" y="125" fill="#e5e7eb" font-family="Georgia, serif" font-size="28" font-weight="400">7</text>
  </g>
  
  <!-- Bottom rule -->
  <line x1="40" y1="172" x2="860" y2="172" stroke="#3d3d3d" stroke-width="0.3"/>
  <line x1="40" y1="175" x2="860" y2="175" stroke="#3d3d3d" stroke-width="1.5"/>
  
  <!-- Footer -->
  <text x="48" y="192" fill="#4b5563" font-family="'Courier New', monospace" font-size="8" letter-spacing="1">ALL DEMOS ON LOCAL DUMMY DATA · NO EXPLOIT CODE</text>
  <text x="860" y="192" text-anchor="end" fill="#4b5563" font-family="'Courier New', monospace" font-size="8" letter-spacing="1">EDUCATIONAL USE ONLY</text>
</svg>
